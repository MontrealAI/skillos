name: Autonomous RSI Capability Treasury Flywheel Proof
on:
  workflow_dispatch:
    inputs:
      seed:
        description: "Deterministic benchmark seed"
        required: false
        default: "20260530"
      publish_to_repo:
        description: "Commit generated proof outputs"
        type: boolean
        required: false
        default: true
      deploy_pages:
        description: "Deploy GitHub Pages directly from this workflow"
        type: boolean
        required: false
        default: false
permissions:
  contents: write
  pages: write
  id-token: write
  actions: read
concurrency:
  group: skillos-pages
  cancel-in-progress: false
jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Run proof
        env: { GITHUB_STEP_SUMMARY: "${{ github.step_summary }}" }
        run: python scripts/run_rsi_capability_treasury_flywheel_proof.py --seed "${{ inputs.seed || '20260530' }}" --summary "$GITHUB_STEP_SUMMARY"
      - name: Verify proof receipt
        run: python scripts/verify_rsi_capability_treasury_flywheel_proof.py
      - name: Render proof webpage and badge
        run: python scripts/render_rsi_capability_treasury_flywheel_site.py
      - name: Publish proof to SkillOS hub
        run: python scripts/publish_rsi_capability_treasury_flywheel_to_hub.py
      - name: Verify site integration
        run: python scripts/verify_rsi_capability_treasury_flywheel_site.py
      - uses: actions/upload-artifact@v4
        with:
          name: rsi-capability-treasury-flywheel-proof
          path: |
            data/rsi-capability-treasury-flywheel-proof.json
            docs/rsi-capability-treasury-flywheel-proof.md
            badges/rsi-capability-treasury-flywheel-proof.svg
            site/**
      - name: Commit generated outputs
        if: ${{ inputs.publish_to_repo }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/rsi-capability-treasury-flywheel-proof.json docs/rsi-capability-treasury-flywheel-proof.md badges/rsi-capability-treasury-flywheel-proof.svg site/
            git commit -m "Run autonomous RSI capability treasury flywheel proof"
            git push
          fi
      - name: Build Pages artifact
        if: ${{ inputs.deploy_pages }}
        run: mkdir -p dist && cp -R site/* dist/
      - uses: actions/configure-pages@v5
        if: ${{ inputs.deploy_pages }}
      - uses: actions/upload-pages-artifact@v3
        if: ${{ inputs.deploy_pages }}
        with: { path: dist }
      - uses: actions/deploy-pages@v4
        if: ${{ inputs.deploy_pages }}
