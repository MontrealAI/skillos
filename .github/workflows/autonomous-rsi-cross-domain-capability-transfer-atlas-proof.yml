name: Autonomous RSI Cross-Domain Capability Transfer Atlas Proof

on:
  workflow_dispatch:
    inputs:
      publish_to_repo:
        description: "Commit generated proof outputs back to the repository"
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy GitHub Pages from this workflow. Keep false if the existing Pages workflow deploys site/."
        required: true
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - ".github/workflows/autonomous-rsi-cross-domain-capability-transfer-atlas-proof.yml"
      - "scripts/run_rsi_cross_domain_capability_transfer_atlas_proof.py"
      - "scripts/verify_rsi_cross_domain_capability_transfer_atlas_proof.py"
      - "scripts/render_rsi_cross_domain_capability_transfer_atlas_site.py"
      - "scripts/publish_rsi_cross_domain_capability_transfer_atlas_to_hub.py"
      - "scripts/verify_rsi_cross_domain_capability_transfer_atlas_site.py"
      - "docs/AUTONOMOUS_RSI_CROSS_DOMAIN_CAPABILITY_TRANSFER_ATLAS_PROOF.md"

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: skillos-rsi-cross-domain-capability-transfer-atlas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proof:
    name: Generate, verify, publish, and optionally deploy proof
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run autonomous cross-domain capability transfer atlas proof
        run: python scripts/run_rsi_cross_domain_capability_transfer_atlas_proof.py --summary "$GITHUB_STEP_SUMMARY"

      - name: Verify proof receipt
        run: python scripts/verify_rsi_cross_domain_capability_transfer_atlas_proof.py

      - name: Render proof webpage
        run: python scripts/render_rsi_cross_domain_capability_transfer_atlas_site.py

      - name: Update public command center and registry
        run: python scripts/publish_rsi_cross_domain_capability_transfer_atlas_to_hub.py

      - name: Verify site integration
        run: python scripts/verify_rsi_cross_domain_capability_transfer_atlas_site.py

      - name: Upload proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillos-rsi-cross-domain-capability-transfer-atlas-proof
          retention-days: 30
          path: |
            data/rsi-cross-domain-capability-transfer-atlas-proof.json
            docs/rsi-cross-domain-capability-transfer-atlas-proof.md
            docs/AUTONOMOUS_RSI_CROSS_DOMAIN_CAPABILITY_TRANSFER_ATLAS_PROOF.md
            badges/rsi-cross-domain-capability-transfer-atlas-proof.svg
            site/rsi-cross-domain-capability-transfer-atlas-proof.html
            site/data/rsi-cross-domain-capability-transfer-atlas-proof.json
            site/docs/rsi-cross-domain-capability-transfer-atlas-proof.md
            site/badges/rsi-cross-domain-capability-transfer-atlas-proof.svg
            site/index.html
            site/proof-registry.json
            site/sitemap.xml
            site/robots.txt

      - name: Commit generated proof outputs
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_to_repo }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/rsi-cross-domain-capability-transfer-atlas-proof.json \
                    docs/rsi-cross-domain-capability-transfer-atlas-proof.md \
                    docs/AUTONOMOUS_RSI_CROSS_DOMAIN_CAPABILITY_TRANSFER_ATLAS_PROOF.md \
                    badges/rsi-cross-domain-capability-transfer-atlas-proof.svg \
                    site/rsi-cross-domain-capability-transfer-atlas-proof.html \
                    site/data/rsi-cross-domain-capability-transfer-atlas-proof.json \
                    site/docs/rsi-cross-domain-capability-transfer-atlas-proof.md \
                    site/badges/rsi-cross-domain-capability-transfer-atlas-proof.svg \
                    site/index.html site/proof-registry.json site/sitemap.xml site/robots.txt
            git commit -m "Refresh autonomous RSI cross-domain transfer atlas proof"
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              if [ "$attempt" = "3" ]; then exit 1; fi
              sleep $((attempt * 5))
            done
          else
            echo "Proof outputs already fresh."
          fi

      - name: Configure GitHub Pages
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_pages }}
        uses: actions/configure-pages@v5

      - name: Build Pages artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_pages }}
        run: |
          mkdir -p dist
          cp -R site/* dist/

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_pages }}
        uses: actions/deploy-pages@v4
