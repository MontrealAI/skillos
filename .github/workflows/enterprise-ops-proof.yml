name: Autonomous Enterprise Ops Market Proof

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/run_enterprise_ops_market_proof.py"
      - "scripts/make_enterprise_ops_proof_visible.py"
      - "scripts/verify_enterprise_ops_proof.py"
      - ".github/workflows/enterprise-ops-proof.yml"
  schedule:
    - cron: "23 12 * * *"

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  proof-and-deploy:
    name: Run proof and deploy visual dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://montrealai.github.io/skillos/
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run autonomous enterprise ops market proof
        run: python scripts/run_enterprise_ops_market_proof.py

      - name: Make proof visible from homepage
        run: python scripts/make_enterprise_ops_proof_visible.py

      - name: Verify proof visibility
        run: python scripts/verify_enterprise_ops_proof.py

      - name: Apply safe public copy if available
        run: python scripts/apply_safe_public_copy.py || true

      - name: Build GitHub Pages site
        run: |
          if [ -f scripts/build_pages.py ]; then
            python scripts/build_pages.py
          else
            mkdir -p dist
            cp -R site/* dist/
          fi

      - name: Upload proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skillos-enterprise-ops-market-proof
          path: |
            site/enterprise-ops-proof.html
            docs/enterprise_ops_market_proof.md
            data/enterprise_ops_market_proof.json
            data/enterprise_ops_benchmark.json
            badges/enterprise_ops_market_proof.svg

      - name: Commit generated proof outputs
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add site/enterprise-ops-proof.html site/index.html docs/enterprise_ops_market_proof.md data/enterprise_ops_market_proof.json data/enterprise_ops_benchmark.json badges/enterprise_ops_market_proof.svg
            git commit -m "Update autonomous enterprise ops market proof"
            git push
          else
            echo "No enterprise ops proof changes to commit."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
