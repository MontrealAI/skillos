name: Deploy SkillOS website with autonomous safe public copy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Safe-copy check, proof, tests, shadow proof link, and website build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Apply safe public copy policy
        run: python scripts/apply_safe_public_copy.py

      - name: Run autonomous no-send shadow pilot proof
        run: |
          if [ -f scripts/run_shadow_pilot_proof.py ]; then
            python scripts/run_shadow_pilot_proof.py --summary "$GITHUB_STEP_SUMMARY"
          else
            echo "Shadow pilot proof runner not found yet; skipping."
          fi

      - name: Make shadow pilot proof visible on main site
        run: python scripts/make_shadow_pilot_visible.py

      - name: Run SkillOS QA, regenerate proof, and build site
        run: python scripts/qa_check.py

      - name: Make shadow pilot proof visible after build
        run: python scripts/make_shadow_pilot_visible.py

      - name: Apply safe public copy policy after visibility update
        run: python scripts/apply_safe_public_copy.py

      - name: Verify shadow pilot proof visibility
        run: python scripts/verify_shadow_pilot_visibility.py

      - name: Verify safe public copy before deploy
        run: python scripts/verify_safe_public_copy.py --strict

      - name: Commit autonomous updates back to repository
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Make shadow pilot proof visible"
            git push
          else
            echo "No autonomous updates to commit."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Publish to https://montrealai.github.io/skillos/
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://montrealai.github.io/skillos/
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
