name: Proof Gradient Proof-Carrying Intelligence Treasury Proof

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: "Deploy the generated Public SkillOS Command Center and proof room to GitHub Pages"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      verify_live:
        description: "Verify the live root and proof page after deployment"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      cancel_legacy_runs:
        description: "Cancel older refresh/deploy workflows that can overwrite the root"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
  push:
    branches: [main]
    paths:
      - ".github/workflows/proof-gradient-proof-carrying-intelligence-treasury.yml"
      - "scripts/run_proof_gradient_proof_carrying_intelligence_treasury.py"
      - "scripts/build_proof_gradient_proof_carrying_intelligence_treasury_site.py"
      - "scripts/verify_proof_gradient_proof_carrying_intelligence_treasury.py"
      - "docs/**"
      - "data/**"

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: skillos-public-command-center-root
  cancel-in-progress: true

jobs:
  proof-gradient-pci:
    name: Generate, verify, publish, and optionally deploy Proof-Carrying Intelligence proof
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Explain root contract
        run: |
          echo "Root contract: /skillos/ is Public SkillOS Command Center."
          echo "Proof rooms are subpages. Proof-Carrying Intelligence must not replace root."

      - name: Cancel legacy refresh/deploy runs
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.cancel_legacy_runs == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/cancel_legacy_skillos_site_runs.py

      - name: Run Proof Gradient Proof-Carrying Intelligence benchmark
        run: python scripts/run_proof_gradient_proof_carrying_intelligence_treasury.py

      - name: Build Public SkillOS Command Center and proof room
        run: python scripts/build_proof_gradient_proof_carrying_intelligence_treasury_site.py --out dist

      - name: Verify generated artifact
        run: python scripts/verify_proof_gradient_proof_carrying_intelligence_treasury.py --out dist

      - name: Upload proof artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: proof-gradient-proof-carrying-intelligence-treasury
          path: |
            dist
            data/proof-gradient-proof-carrying-intelligence-treasury.json
            docs/PROOF_GRADIENT_PROOF_CARRYING_INTELLIGENCE_TREASURY_PROOF.md
            badges/proof-gradient-proof-carrying-intelligence-treasury.svg

      - name: Commit generated proof outputs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/proof-gradient-proof-carrying-intelligence-treasury.json docs/PROOF_GRADIENT_PROOF_CARRYING_INTELLIGENCE_TREASURY_PROOF.md badges/proof-gradient-proof-carrying-intelligence-treasury.svg
          git diff --cached --quiet || git commit -m "Add Proof Gradient Proof-Carrying Intelligence Treasury proof outputs"
          git push || true

      - name: Configure GitHub Pages
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages artifact
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live root and proof page
        if: ${{ github.event_name != 'workflow_dispatch' || (inputs.deploy_pages == 'true' && inputs.verify_live == 'true') }}
        run: python scripts/verify_live_proof_gradient_proof_carrying_intelligence_treasury.py
