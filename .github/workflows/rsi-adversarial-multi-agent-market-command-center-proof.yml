name: Autonomous RSI Adversarial Multi-Agent Market Command Center Proof

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/run_rsi_adversarial_multi_agent_market_command_center_proof.py"
      - "scripts/make_rsi_adversarial_multi_agent_market_command_center_proof_visible.py"
      - "scripts/verify_rsi_adversarial_multi_agent_market_command_center_proof.py"
      - ".github/workflows/rsi-adversarial-multi-agent-market-command-center-proof.yml"
  schedule:
    - cron: "17 14 * * *"

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  proof-and-deploy:
    name: Run adversarial RSI multi-agent proof and deploy dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://montrealai.github.io/skillos/
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run autonomous RSI adversarial multi-agent market command proof
        run: python scripts/run_rsi_adversarial_multi_agent_market_command_center_proof.py

      - name: Make proof visible from homepage
        run: python scripts/make_rsi_adversarial_multi_agent_market_command_center_proof_visible.py

      - name: Verify proof visibility
        run: python scripts/verify_rsi_adversarial_multi_agent_market_command_center_proof.py

      - name: Apply safe public copy if available
        run: python scripts/apply_safe_public_copy.py || true

      - name: Re-assert proof visibility after safe-copy pass
        run: python scripts/make_rsi_adversarial_multi_agent_market_command_center_proof_visible.py

      - name: Build GitHub Pages site
        run: |
          if [ -f scripts/build_pages.py ]; then
            python scripts/build_pages.py
          else
            mkdir -p dist
            cp -R site/* dist/
          fi

      - name: Verify built site contains proof page
        run: |
          test -f dist/rsi-adversarial-multi-agent-market-command-center-proof.html
          grep -q "Adversarial RSI Multi-Agent Market Command Center" dist/rsi-adversarial-multi-agent-market-command-center-proof.html

      - name: Upload proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skillos-rsi-adversarial-multi-agent-market-command-center-proof
          path: |
            site/rsi-adversarial-multi-agent-market-command-center-proof.html
            docs/rsi_adversarial_multi_agent_market_command_center_proof.md
            data/rsi_adversarial_multi_agent_market_command_center_proof.json
            data/rsi_adversarial_multi_agent_market_command_center_benchmark.json
            badges/rsi_adversarial_multi_agent_market_command_center_proof.svg

      - name: Commit generated proof outputs
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add site/rsi-adversarial-multi-agent-market-command-center-proof.html site/index.html docs/rsi_adversarial_multi_agent_market_command_center_proof.md data/rsi_adversarial_multi_agent_market_command_center_proof.json data/rsi_adversarial_multi_agent_market_command_center_benchmark.json badges/rsi_adversarial_multi_agent_market_command_center_proof.svg
            git commit -m "Update autonomous RSI adversarial multi-agent market command proof"
            git push
          else
            echo "No RSI adversarial multi-agent proof changes to commit."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
