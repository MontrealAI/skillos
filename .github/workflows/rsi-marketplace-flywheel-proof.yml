name: Autonomous RSI Marketplace Flywheel Market Proof

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/run_rsi_marketplace_flywheel_market_proof.py"
      - "scripts/make_rsi_marketplace_flywheel_proof_visible.py"
      - "scripts/verify_rsi_marketplace_flywheel_proof.py"
      - ".github/workflows/rsi-marketplace-flywheel-proof.yml"
  schedule:
    - cron: "31 13 * * *"

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  proof-and-deploy:
    name: Run RSI marketplace flywheel proof and deploy visual dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://montrealai.github.io/skillos/
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run autonomous RSI marketplace flywheel market proof
        run: python scripts/run_rsi_marketplace_flywheel_market_proof.py

      - name: Make proof visible from homepage
        run: python scripts/make_rsi_marketplace_flywheel_proof_visible.py

      - name: Verify proof visibility
        run: python scripts/verify_rsi_marketplace_flywheel_proof.py

      - name: Apply safe public copy if available
        run: python scripts/apply_safe_public_copy.py || true

      - name: Build GitHub Pages site
        run: |
          if [ -f scripts/build_pages.py ]; then
            python scripts/build_pages.py
          else
            mkdir -p dist
            cp -R site/* dist/
          fi

      - name: Upload proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skillos-rsi-marketplace-flywheel-proof
          path: |
            site/rsi-marketplace-flywheel-proof.html
            docs/rsi_marketplace_flywheel_market_proof.md
            data/rsi_marketplace_flywheel_market_proof.json
            data/rsi_marketplace_flywheel_benchmark.json
            badges/rsi_marketplace_flywheel_market_proof.svg

      - name: Commit generated proof outputs
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add site/rsi-marketplace-flywheel-proof.html site/index.html docs/rsi_marketplace_flywheel_market_proof.md data/rsi_marketplace_flywheel_market_proof.json data/rsi_marketplace_flywheel_benchmark.json badges/rsi_marketplace_flywheel_market_proof.svg
            git commit -m "Update autonomous RSI marketplace flywheel proof"
            git push
          else
            echo "No RSI marketplace flywheel proof changes to commit."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
