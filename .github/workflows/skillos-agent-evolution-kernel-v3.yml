name: SkillOS Agent Evolution Protocol Kernel v3

on:
  workflow_dispatch:
    inputs:
      publish_to_repo:
        description: "Commit generated additive site outputs"
        type: boolean
        required: false
        default: true
      deploy_pages:
        description: "Deploy GitHub Pages artifact"
        type: boolean
        required: false
        default: true
      verify_live:
        description: "Verify live root after deployment"
        type: boolean
        required: false
        default: false
  push:
    branches: [ main ]
    paths:
      - "data/proof_carrying_intelligence_kernel_v3_source.json"
      - "scripts/build_skillos_agent_evolution_kernel_v3.py"
      - "scripts/verify_skillos_agent_evolution_kernel_v3.py"
      - ".github/workflows/skillos-agent-evolution-kernel-v3.yml"

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: skillos-pages
  cancel-in-progress: false

jobs:
  build-verify-deploy:
    name: Build, verify, and deploy Agent Evolution Protocol Kernel v3
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build additive Command Center expansion
        run: python scripts/build_skillos_agent_evolution_kernel_v3.py --out dist

      - name: Verify additive expansion
        run: python scripts/verify_skillos_agent_evolution_kernel_v3.py --out dist

      - name: Commit generated outputs
        if: ${{ inputs.publish_to_repo }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p site
          cp -R dist/* site/
          git add site data/proof_carrying_intelligence_kernel_v3_source.json docs/SKILLOS_AGENT_EVOLUTION_PROTOCOL_KERNEL_V3.md || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Expand SkillOS to Agent Evolution Protocol Kernel v3"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages
        id: deployment
        if: ${{ inputs.deploy_pages }}
        uses: actions/deploy-pages@v4

      - name: Verify live root
        if: ${{ inputs.verify_live }}
        run: python scripts/verify_live_skillos_agent_evolution_kernel_v3.py
