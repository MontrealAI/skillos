name: SkillOS Public Proof Command Center Refresh

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skillos-legacy-command-center-disabled
  cancel-in-progress: true

jobs:
  retired:
    name: Legacy workflow retired
    runs-on: ubuntu-latest
    steps:
      - name: Explain canonical workflow
        run: |
          echo "This legacy refresh workflow has been retired to prevent the old homepage from overwriting /skillos/."
          echo "Run: Deploy SkillOS website with autonomous safe public copy"
          echo "Canonical manifest: https://montrealai.github.io/skillos/data/command-center-manifest.json"
