name: SkillOS Public Proof Command Center Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "scripts/**"
      - "docs/**"
      - "data/**"
      - "site/**"
      - "badges/**"
  workflow_run:
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: skillos-public-proof-command-center
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh public proof command center
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.name != 'SkillOS Public Proof Command Center Refresh' && github.event.workflow_run.name != 'SkillOS Run All Public Proofs') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://montrealai.github.io/skillos/
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate fresh public proof command center
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/refresh_public_site.py

      - name: Verify public proof command center
        run: python scripts/verify_public_site_refresh.py

      - name: Commit refreshed public site
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add site/index.html site/proofs.html site/actions.html site/multi-agent.html site/receipts.html site/leaderboard.html site/architecture.html site/runbook.html site/assets/command-center.css site/assets/command-center.js site/manifest.webmanifest site/robots.txt site/sitemap.xml site/og-card.svg site/public_site_status.json data/public_site_status.json docs/SKILLOS_PUBLIC_SITE_STATUS.md
            git commit -m "Refresh SkillOS public proof command center"
            git push
          else
            echo "Public proof command center already fresh."
          fi

      - name: Build Pages artifact
        run: |
          mkdir -p dist
          cp -R site/* dist/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages
        uses: actions/deploy-pages@v4
